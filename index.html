<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - Special Sequence</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      color-space="sRGB" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="aris-model"
          src="#modelNormal" 
          position="0 0 0" 
          rotation="90 0 0" 
          scale="1 1 1"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
      let lastPlayTime = 0;
      let playCount = 0; // Biến đếm số lần phát
      const COOLDOWN = 20000; // 20 giây
      
      const targetEl = document.querySelector('#target');
      const modelEl = document.querySelector('#aris-model');

      targetEl.addEventListener("targetFound", event => {
        const currentTime = Date.now();
        
        if (currentTime - lastPlayTime >= COOLDOWN) {
          playCount++;
          console.log("Lần xuất hiện thứ: " + playCount);

          let soundToPlay;

          if (playCount <= 5) {
            // Chu kỳ 5 lần đầu: Dùng model thường + SFX Cafe
            modelEl.setAttribute('src', '#modelNormal');
            const randIndex = Math.floor(Math.random() * 5) + 1;
            soundToPlay = document.querySelector(`#snd-cafe-${randIndex}`);
          } 
          else {
            // Lần thứ 6: Đổi sang model 2 + SFX Inter
            console.log("--- XUẤT HIỆN MODEL ĐẶC BIỆT ---");
            modelEl.setAttribute('src', '#modelSpecial');
            const randInter = Math.floor(Math.random() * 3) + 1;
            soundToPlay = document.querySelector(`#snd-inter-${randInter}`);
            
            // Reset biến đếm về 0 để quay lại chu kỳ cũ
            playCount = 0;
          }

          if (soundToPlay) {
            soundToPlay.pause();
            soundToPlay.currentTime = 0;
            soundToPlay.play().catch(e => console.log("Cần chạm màn hình để phát âm thanh"));
            lastPlayTime = currentTime;
          }
        }
      });
    </script>
  </body>
</html>
