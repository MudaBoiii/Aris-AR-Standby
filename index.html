<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - 2:1 Cycle Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="arisNormal" src="#modelNormal" visible="true"
          position="0 0 0" rotation="90 0 0" scale="1 1 1"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>

        <a-gltf-model id="arisSpecial" src="#modelSpecial" visible="false"
          position="0 0 0" rotation="90 0 0" scale="1 1 1"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
      let isVisible = false;
      let voiceTimer = null;
      let normalLoops = 0;
      let specialLoops = 0;

      const targetEl = document.querySelector('#target');
      const mNormal = document.querySelector('#arisNormal');
      const mSpecial = document.querySelector('#arisSpecial');

      // --- HÀM PHÁT ÂM THANH NGẪU NHIÊN ---
      function playVoice(type) {
        if (!isVisible) return; // Nếu đang mất dấu target thì không phát
        
        let sound;
        if (type === 'cafe') {
          const rand = Math.floor(Math.random() * 5) + 1;
          sound = document.querySelector(`#snd-cafe-${rand}`);
        } else if (type === 'inter') {
          const rand = Math.floor(Math.random() * 3) + 1;
          sound = document.querySelector(`#snd-inter-${rand}`);
        }

        if (sound) {
          sound.pause();
          sound.currentTime = 0;
          sound.play().catch(e => console.log("Cần tương tác chạm màn hình trước khi có thể phát âm thanh."));
        }
      }

      // --- SỰ KIỆN: KHI TÌM THẤY ẢNH ---
      targetEl.addEventListener("targetFound", () => {
        isVisible = true;
        
        // Khởi động đồng hồ đếm 20s phát tiếng Cafe
        clearInterval(voiceTimer);
        voiceTimer = setInterval(() => {
          playVoice('cafe');
        }, 20000); 
      });

      // --- SỰ KIỆN: KHI MẤT DẤU ẢNH ---
      targetEl.addEventListener("targetLost", () => {
        isVisible = false;
        clearInterval(voiceTimer); // Dừng phát âm thanh 20s
      });

      // --- SỰ KIỆN: KHI MODEL 1 CHẠY XONG 1 VÒNG ANIMATION ---
      mNormal.addEventListener('animation-loop', () => {
        if (!isVisible || mNormal.getAttribute('visible') === false) return;
        
        normalLoops++;
        
        // Chạy hết 2 vòng thì đổi sang Model 2
        if (normalLoops >= 2) {
          normalLoops = 0;
          mNormal.setAttribute('visible', 'false');
          mSpecial.setAttribute('visible', 'true');
          
          // Reset lại hoạt ảnh để Model 2 chạy mượt từ frame đầu tiên
          mSpecial.removeAttribute('animation-mixer');
          setTimeout(() => mSpecial.setAttribute('animation-mixer', 'clip: *; loop: repeat'), 10);
          
          // Phát âm thanh Inter
          playVoice('inter');
        }
      });

      // --- SỰ KIỆN: KHI MODEL 2 CHẠY XONG 1 VÒNG ANIMATION ---
      mSpecial.addEventListener('animation-loop', () => {
        if (!isVisible || mSpecial.getAttribute('visible') === false) return;
        
        specialLoops++;
        
        // Chạy hết 1 vòng thì đổi lại sang Model 1
        if (specialLoops >= 1) {
          specialLoops = 0;
          mSpecial.setAttribute('visible', 'false');
          mNormal.setAttribute('visible', 'true');
          
          // Reset lại hoạt ảnh cho Model 1
          mNormal.removeAttribute('animation-mixer');
          setTimeout(() => mNormal.setAttribute('animation-mixer', 'clip: *; loop: repeat'), 10);
        }
      });
    </script>
  </body>
</html>
