<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - Special Cycle Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="arisNormal" src="#modelNormal" visible="true"
          position="0 0 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>

        <a-gltf-model id="arisSpecial" src="#modelSpecial" visible="false"
          position="0 0 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
      let lastPlayTime = 0;
      let playCount = 0; // Biến đếm số lần xuất hiện
      const COOLDOWN = 20000; 

      const targetEl = document.querySelector('#target');
      const mNormal = document.querySelector('#arisNormal');
      const mSpecial = document.querySelector('#arisSpecial');

      targetEl.addEventListener("targetFound", event => {
        const currentTime = Date.now();
        
        if (currentTime - lastPlayTime >= COOLDOWN) {
          playCount++;
          console.log("Lần xuất hiện thứ: " + playCount);

          if (playCount >= 5) {
            // --- XUẤT HIỆN MODEL 2 (Lần thứ 5) ---
            mNormal.setAttribute('visible', 'false');
            mSpecial.setAttribute('visible', 'true');
            
            // Phát âm thanh Inter ngẫu nhiên
            const randInter = Math.floor(Math.random() * 3) + 1;
            const sound = document.querySelector(`#snd-inter-${randInter}`);
            if (sound) playSound(sound);

            // Reset biến đếm về 0 để quay lại chu trình
            playCount = 0;
          } else {
            // --- XUẤT HIỆN MODEL THƯỜNG ---
            mNormal.setAttribute('visible', 'true');
            mSpecial.setAttribute('visible', 'false');

            // Phát âm thanh Cafe ngẫu nhiên
            const randCafe = Math.floor(Math.random() * 5) + 1;
            const sound = document.querySelector(`#snd-cafe-${randCafe}`);
            if (sound) playSound(sound);
          }

          lastPlayTime = currentTime;
        }
      });

      function playSound(el) {
        el.pause();
        el.currentTime = 0;
        el.play().catch(e => console.log("Cần chạm màn hình để kích hoạt âm thanh"));
      }
    </script>
  </body>
</html>
