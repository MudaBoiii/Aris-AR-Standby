<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - Classic Fixed Pro</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="arisNormal" src="#modelNormal" 
          position="0 0 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>

        <a-gltf-model id="arisSpecial" src="#modelSpecial" 
          position="0 0 0" rotation="90 0 0" scale="0 0 0"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="0 2 2" intensity="0.7"></a-light>
    </a-scene>

    <script>
      let isVisible = false;
      let voiceTimer = null;
      let normalLoops = 0;
      let specialLoops = 0;

      const mNormal = document.querySelector('#arisNormal');
      const mSpecial = document.querySelector('#arisSpecial');
      const targetEl = document.querySelector('#target');

      // Hàm phát âm thanh chung
      function playVoice(type) {
        if (!isVisible) return;
        
        let soundId;
        if (type === 'cafe') {
          soundId = `#snd-cafe-${Math.floor(Math.random() * 5) + 1}`;
        } else {
          soundId = `#snd-inter-${Math.floor(Math.random() * 3) + 1}`;
        }
        
        const sound = document.querySelector(soundId);
        if (sound) {
          sound.pause();
          sound.currentTime = 0;
          sound.play().catch(e => console.log("User interaction required"));
        }
      }

      // Khi tìm thấy ảnh
      targetEl.addEventListener("targetFound", () => {
        isVisible = true;
        
        // Phát tiếng cafe ngay lập tức khi vừa thấy mặt
        playVoice('cafe');

        // Thiết lập vòng lặp 20s phát tiếng cafe
        if (voiceTimer) clearInterval(voiceTimer);
        voiceTimer = setInterval(() => {
          if (isVisible) playVoice('cafe');
        }, 20000);
      });

      // Khi mất dấu ảnh
      targetEl.addEventListener("targetLost", () => {
        isVisible = false;
        if (voiceTimer) clearInterval(voiceTimer);
      });

      // Theo dõi vòng lặp Model 1
      mNormal.addEventListener('animation-loop', () => {
        if (!isVisible || mNormal.getAttribute('scale').x === 0) return;
        
        normalLoops++;
        if (normalLoops >= 2) {
          normalLoops = 0;
          // Chuyển sang Model 2
          mNormal.setAttribute('scale', '0 0 0');
          mSpecial.setAttribute('scale', '0.4 0.4 0.4');
          
          // Phát SFX Inter ngay khi chuyển
          playVoice('inter');
        }
      });

      // Theo dõi vòng lặp Model 2
      mSpecial.addEventListener('animation-loop', () => {
        if (!isVisible || mSpecial.getAttribute('scale').x === 0) return;
        
        specialLoops++;
        if (specialLoops >= 1) {
          specialLoops = 0;
          // Quay lại Model 1
          mSpecial.setAttribute('scale', '0 0 0');
          mNormal.setAttribute('scale', '0.4 0.4 0.4');
        }
      });
    </script>
  </body>
</html>
