<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - Cycle 2:1 Animation Based</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="arisNormal" src="#modelNormal" 
          position="0 0 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>

        <a-gltf-model id="arisSpecial" src="#modelSpecial" 
          position="0 -1000 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
      let isVisible = false;
      let voiceInterval = null;
      let normalLoopCount = 0;
      let specialLoopCount = 0;

      const mNormal = document.querySelector('#arisNormal');
      const mSpecial = document.querySelector('#arisSpecial');
      const targetEl = document.querySelector('#target');

      function playSound(type) {
        if(!isVisible) return;
        let id = type === 'cafe' 
          ? `#snd-cafe-${Math.floor(Math.random() * 5) + 1}`
          : `#snd-inter-${Math.floor(Math.random() * 3) + 1}`;
        const s = document.querySelector(id);
        if(s) { s.pause(); s.currentTime = 0; s.play().catch(()=>{}); }
      }

      // Tự động phát tiếng Cafe mỗi 20s khi đang nhìn thấy ảnh
      targetEl.addEventListener("targetFound", () => {
        isVisible = true;
        if(!voiceInterval) {
          voiceInterval = setInterval(() => playSound('cafe'), 20000);
        }
      });

      targetEl.addEventListener("targetLost", () => {
        isVisible = false;
        clearInterval(voiceInterval);
        voiceInterval = null;
      });

      // LẮNG NGHE VÒNG LẶP ANIMATION CỦA MODEL 1
      mNormal.addEventListener('animation-loop', () => {
        if(!isVisible) return;
        normalLoopCount++;
        
        if(normalLoopCount >= 2) { // Sau 2 lần chạy model thường
          normalLoopCount = 0;
          // Hoán đổi vị trí
          mNormal.setAttribute('position', '0 -1000 0');
          mSpecial.setAttribute('position', '0 0 0');
          
          // Phát âm thanh của model 2
          playSound('inter');
        }
      });

      // LẮNG NGHE VÒNG LẶP ANIMATION CỦA MODEL 2
      mSpecial.addEventListener('animation-loop', () => {
        if(!isVisible) return;
        specialLoopCount++;

        if(specialLoopCount >= 1) { // Sau 1 lần chạy model 2
          specialLoopCount = 0;
          // Hoán đổi lại
          mSpecial.setAttribute('position', '0 -1000 0');
          mNormal.setAttribute('position', '0 0 0');
        }
      });
    </script>
  </body>
</html>
