<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AR - Classic Fixed</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; warmupTolerance: 7; missTolerance: 7;" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="modelNormal" src="model.glb"></a-asset-item>
        <a-asset-item id="modelSpecial" src="model2.glb"></a-asset-item>
        
        <audio id="snd-cafe-1" src="SFX/Alice_Cafe_Act_1.ogg"></audio>
        <audio id="snd-cafe-2" src="SFX/Alice_Cafe_Act_2.ogg"></audio>
        <audio id="snd-cafe-3" src="SFX/Alice_Cafe_Act_3.ogg"></audio>
        <audio id="snd-cafe-4" src="SFX/Alice_Cafe_Act_4.ogg"></audio>
        <audio id="snd-cafe-5" src="SFX/Alice_Cafe_Act_5.ogg"></audio>

        <audio id="snd-inter-1" src="SFX/Inter1.mp3"></audio>
        <audio id="snd-inter-2" src="SFX/Inter2.mp3"></audio>
        <audio id="snd-inter-3" src="SFX/Inter3.mp3"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="arisNormal" src="#modelNormal" 
          position="0 0 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>

        <a-gltf-model id="arisSpecial" src="#modelSpecial" 
          position="0 -1000 0" rotation="90 0 0" scale="0.4 0.4 0.4"
          animation-mixer="clip: *; loop: repeat">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="0 2 2" intensity="0.7"></a-light>
    </a-scene>

    <script>
      let isScanning = false;
      let playCount = 0;
      let lastVoiceTime = 0;
      const COOLDOWN = 20000; // 20 giây

      const targetEl = document.querySelector('#target');
      const mNormal = document.querySelector('#arisNormal');
      const mSpecial = document.querySelector('#arisSpecial');

      // Hàm phát âm thanh
      function playRandomSound(type) {
        let soundId;
        if (type === 'cafe') {
          soundId = `#snd-cafe-${Math.floor(Math.random() * 5) + 1}`;
        } else {
          soundId = `#snd-inter-${Math.floor(Math.random() * 3) + 1}`;
        }
        const s = document.querySelector(soundId);
        if (s) {
          s.pause();
          s.currentTime = 0;
          s.play().catch(() => {});
        }
      }

      // Vòng lặp kiểm tra âm thanh mỗi giây
      setInterval(() => {
        if (!isScanning) return;
        
        const now = Date.now();
        if (now - lastVoiceTime >= COOLDOWN) {
          playRandomSound('cafe');
          lastVoiceTime = now;
        }
      }, 1000);

      targetEl.addEventListener("targetFound", () => {
        isScanning = true;
        
        // Logic đổi Model: 2 thường -> 1 đặc biệt
        playCount++;
        if (playCount % 3 === 0) {
          // Hiện model 2, giấu model 1
          mNormal.setAttribute('position', '0 -1000 0');
          mSpecial.setAttribute('position', '0 0 0');
          playRandomSound('inter');
        } else {
          // Hiện model 1, giấu model 2
          mNormal.setAttribute('position', '0 0 0');
          mSpecial.setAttribute('position', '0 -1000 0');
        }
        
        // Luôn phát âm thanh cafe khi vừa thấy mặt target (lần đầu hoặc sau cooldown)
        const now = Date.now();
        if (now - lastVoiceTime >= COOLDOWN) {
          playRandomSound('cafe');
          lastVoiceTime = now;
        }
      });

      targetEl.addEventListener("targetLost", () => {
        isScanning = false;
      });
    </script>
  </body>
</html>
